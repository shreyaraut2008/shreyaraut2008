<svg width="340" height="360" viewBox="0 0 340 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="gG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="70%"  stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sG" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="aC">
      <circle cx="170" cy="150" r="88"/>
    </clipPath>
  </defs>

  <!-- ── Pulsing background glow ── -->
  <circle cx="170" cy="150" r="126" fill="url(#gG)">
    <animate attributeName="r"       values="118;136;118" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6"   dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Outer dashed ring — spins CW ── -->
  <circle cx="170" cy="150" r="104"
          fill="none" stroke="url(#rG)" stroke-width="2.5"
          stroke-dasharray="18 10" opacity="0.78">
    <animateTransform attributeName="transform" type="rotate"
      from="0 170 150" to="360 170 150" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Inner dashed ring — spins CCW ── -->
  <circle cx="170" cy="150" r="96"
          fill="none" stroke="#a855f7" stroke-width="1"
          stroke-dasharray="6 14" opacity="0.45">
    <animateTransform attributeName="transform" type="rotate"
      from="0 170 150" to="-360 170 150" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Avatar background circle ── -->
  <circle cx="170" cy="150" r="89" fill="#0D1117" stroke="url(#rG)" stroke-width="3"/>

  <!-- ── Avatar image (static — GitHub allows this) ── -->
  <image href="https://i.postimg.cc/K8M0YN7S/Screenshot-2026-06-20-211706.png"
         x="82" y="62" width="176" height="176"
         clip-path="url(#aC)"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- ── Screen shimmer on avatar ── -->
  <circle cx="170" cy="150" r="89" fill="url(#sG)" clip-path="url(#aC)">
    <animate attributeName="opacity" values="0.06;0.2;0.06" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Orbiting dot 1 — violet (top, CW fast) ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 170 150" to="360 170 150" dur="5s" repeatCount="indefinite"/>
    <circle cx="170" cy="46" r="5" fill="#a855f7" opacity="0.95"/>
  </g>

  <!-- ── Orbiting dot 2 — cyan (bottom, CW fast, offset 180°) ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="180 170 150" to="540 170 150" dur="5s" repeatCount="indefinite"/>
    <circle cx="170" cy="46" r="4" fill="#06b6d4" opacity="0.9"/>
  </g>

  <!-- ── Orbiting dot 3 — indigo (side, CW slow, offset 90°) ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="90 170 150" to="450 170 150" dur="8s" repeatCount="indefinite"/>
    <circle cx="170" cy="54" r="3" fill="#818cf8" opacity="0.85"/>
  </g>

  <!-- ── Code tag left ── -->
  <rect x="28" y="262" width="74" height="28" rx="8"
        fill="#1e1b4b" stroke="#a855f7" stroke-width="1.3" opacity="0.93"/>
  <text x="65" y="281" font-family="monospace" font-size="13"
        fill="#a855f7" text-anchor="middle">&lt;code/&gt;</text>

  <!-- ── Code tag right ── -->
  <rect x="238" y="262" width="74" height="28" rx="8"
        fill="#0c1a2e" stroke="#06b6d4" stroke-width="1.3" opacity="0.93"/>
  <text x="275" y="281" font-family="monospace" font-size="13"
        fill="#06b6d4" text-anchor="middle">{ AI }</text>

  <!-- ── Typing cursor pill ── -->
  <rect x="146" y="304" width="48" height="22" rx="7"
        fill="#111827" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="157" y="320" font-family="monospace" font-size="11" fill="#c4b5fd">dev</text>
  <rect x="183" y="308" width="2.5" height="13" rx="1" fill="#a855f7">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- ── Sparkle particles ── -->
  <circle cx="58" cy="80" r="2.5" fill="#a855f7">
    <animate attributeName="opacity" values="0;1;0" dur="2.3s" begin="0s"   repeatCount="indefinite"/>
    <animate attributeName="cy"      values="80;70;80" dur="2.3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="288" cy="100" r="2" fill="#06b6d4">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="100;90;100" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="200" r="1.8" fill="#818cf8">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.7s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="304" cy="220" r="2.2" fill="#a855f7">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="cy"      values="220;210;220" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="28" r="1.5" fill="#06b6d4">
    <animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

</svg>
